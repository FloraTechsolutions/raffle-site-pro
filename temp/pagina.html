<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldenRIFA | Sorteios em Dinheiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .pulse-gold { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAÇÃO ---
        const WHATSAPP_NUMBER = "5511999999999";

        // --- ÍCONES ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                crown: <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                ticket: <path d="M2 9V5a2 2 0 012-2h16a2 2 0 012 2v4M2 9a3 3 0 010 6m20-6a3 3 0 000 6M2 15v4a2 2 0 002 2h16a2 2 0 002-2v-4" />,
                whatsapp: <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-10.6 8.38 8.38 0 013.8.9L22 2l-1.5 5.5z" />,
                award: <path d="M12 15l-2 5L9 9l11 4-5 2zm0 0l4 8 3-11-11 3 4 8z" />,
                trophy: <path d="M6 9V2h12v7M6 18h12m-9-9v9m6-9v9M4 11a3 3 0 110-6h2v6H4zm14 0V5h2a3 3 0 110 6h-2z" />,
                cash: <path d="M12 1v22m5-18H7a3 3 0 000 6h10a3 3 0 010 6H7" />
            };
            return (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- DADOS ---
        const RAFFLES = [
            { id: 1, titulo: "PIX DE R$ 100.000,00", desc: "Prêmio principal em dinheiro vivo.", preco: 0.50, vendidos: 460000, total: 500000, img: "https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=800" },
            { id: 2, titulo: "PIX DE R$ 20.000,00", desc: "Sorteio rápido para 100k cotas.", preco: 0.20, vendidos: 85000, total: 100000, img: "https://images.unsplash.com/photo-1621981386829-9b458a2cddde?q=80&w=800" },
            { id: 3, titulo: "PIX DE R$ 5.000,00", desc: "Chance alta de ganhar hoje!", preco: 0.05, vendidos: 12000, total: 30000, img: "https://images.unsplash.com/photo-1518458028785-8fbcd101ebb9?q=80&w=800" }
        ];

        const RANKING = [
            { nome: "Marcos S.", cotas: 1450, avatar: "MS" },
            { nome: "Ana Paula", cotas: 980, avatar: "AP" },
            { nome: "Ricardo Oliveira", cotas: 720, avatar: "RO" },
            { nome: "Carla Menezes", cotas: 450, avatar: "CM" }
        ];

        const WINNERS = [
            { nome: "Felipe T.", premio: "R$ 50.000,00", data: "12/02", rifa: "Super Pix 50k" },
            { nome: "Juliana K.", premio: "R$ 10.000,00", data: "05/02", rifa: "Pix Relâmpago" },
            { nome: "André L.", premio: "R$ 5.000,00", data: "01/02", rifa: "Giro da Sorte" },
            { nome: "Patrícia M.", premio: "R$ 25.000,00", data: "28/01", rifa: "Mega Dinheiro" }
        ];

        // --- COMPONENTES ---
        const ProgressBar = ({ vendidos, total }) => {
            const pct = (vendidos / total) * 100;
            const isConfirmed = pct >= 90;
            return (
                <div className="w-full space-y-2">
                    <div className="flex justify-between text-[10px] font-bold uppercase tracking-widest">
                        <span className="text-zinc-500">{pct.toFixed(1)}% Vendido</span>
                        <span className={isConfirmed ? "text-emerald-400" : "text-amber-500"}>
                            {isConfirmed ? "SORTEIO CONFIRMADO" : "META: 90%"}
                        </span>
                    </div>
                    <div className="h-2.5 bg-zinc-900 rounded-full border border-white/5 overflow-hidden p-0.5">
                        <div 
                            className={`h-full rounded-full transition-all duration-1000 ${isConfirmed ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-amber-500'}`} 
                            style={{ width: `${pct}%` }} 
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [qty, setQty] = useState(100);
            const [toast, setToast] = useState(null);

            // Simulação de Prova Social
            useEffect(() => {
                const names = ["João", "Maria", "Pedro", "Letícia", "Fernando", "Beatriz", "Carlos", "Renata"];
                const interval = setInterval(() => {
                    const name = names[Math.floor(Math.random()*names.length)];
                    const amount = [50, 100, 200, 500, 1000][Math.floor(Math.random()*5)];
                    setToast({ name, amount });
                    setTimeout(() => setToast(null), 5000);
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            const handleBuy = (raffle, count) => {
                const totalVal = (raffle.preco * count).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                const text = `💰 *PEDIDO DE COTAS - GOLDENRIFA*\n\n💎 *Prêmio:* ${raffle.titulo}\n🎫 *Quantidade:* ${count} cotas\n💵 *Total:* ${totalVal}\n\nQuero o link para pagamento via PIX!`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
            };

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="gold-gradient p-2 rounded-lg text-black">
                                    <Icon name="crown" className="w-5 h-5" />
                                </div>
                                <h1 className="text-xl font-black italic tracking-tighter uppercase">Golden<span className="text-amber-500">Rifa</span></h1>
                            </div>
                            <div className="hidden md:flex gap-8 text-[10px] font-extrabold uppercase tracking-[0.2em] text-zinc-400">
                                <a href="#rifas" className="hover:text-amber-500 transition-colors">Sorteios</a>
                                <a href="#ranking" className="hover:text-amber-500 transition-colors">Ranking</a>
                                <a href="#ganhadores" className="hover:text-amber-500 transition-colors">Ganhadores</a>
                            </div>
                            <button className="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-[10px] font-black uppercase hover:bg-white/10 transition-all">Meus Números</button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="pt-40 pb-20 px-6 max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
                        <div className="space-y-8 animate-in">
                            <div className="inline-flex items-center gap-3 bg-white/5 border border-white/10 px-4 py-2 rounded-full">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span className="text-[10px] font-black uppercase tracking-widest text-zinc-300">Pagamentos via PIX Automático</span>
                            </div>
                            <h2 className="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-[0.85]">
                                Dinheiro no <br/> bolso em <br/><span className="text-amber-500">segundos.</span>
                            </h2>
                            <p className="text-zinc-500 text-lg max-w-md font-medium leading-relaxed">
                                Escolha o seu prêmio, adquira suas cotas e concorra através da Loteria Federal. O prêmio cai na conta assim que o sorteio é realizado.
                            </p>
                            
                            <div className="glass-card p-8 rounded-[2.5rem] border-white/10 shadow-2xl relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-110 transition-transform">
                                    <Icon name="cash" className="w-32 h-32" />
                                </div>
                                <div className="relative space-y-6">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-[10px] font-black text-amber-500 uppercase tracking-[0.3em] mb-1">Destaque do Momento</p>
                                            <h3 className="text-3xl font-black italic uppercase">{RAFFLES[0].titulo}</h3>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-bold text-zinc-500 uppercase">Cota por</p>
                                            <p className="text-3xl font-black text-white">R$ {RAFFLES[0].preco.toFixed(2)}</p>
                                        </div>
                                    </div>

                                    <ProgressBar vendidos={RAFFLES[0].vendidos} total={RAFFLES[0].total} />

                                    <div className="grid grid-cols-4 gap-3">
                                        {[100, 500, 1000, 5000].map(val => (
                                            <button 
                                                key={val} 
                                                onClick={() => setQty(val)}
                                                className={`py-4 rounded-2xl border text-xs font-black transition-all ${qty === val ? 'bg-amber-500 border-amber-500 text-black' : 'bg-white/5 border-white/10 hover:border-white/30'}`}
                                            >
                                                +{val}
                                            </button>
                                        ))}
                                    </div>

                                    <button 
                                        onClick={() => handleBuy(RAFFLES[0], qty)}
                                        className="w-full gold-gradient py-6 rounded-2xl text-black font-black uppercase italic tracking-widest hover:scale-[1.02] active:scale-95 transition-all pulse-gold"
                                    >
                                        Garantir Minha Sorte
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Imagem Placeholder Decorativa */}
                        <div className="hidden lg:block relative">
                             <div className="absolute -top-20 -right-20 w-96 h-96 bg-amber-500/10 blur-[150px] rounded-full"></div>
                             <div className="relative glass p-6 rounded-[4rem] border-white/10">
                                <div className="aspect-[4/5] rounded-[3.5rem] overflow-hidden relative">
                                    <img src={RAFFLES[0].img} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                    <div className="absolute bottom-12 left-10 right-10 p-8 glass rounded-3xl border-white/10">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-emerald-500/20 text-emerald-500 rounded-2xl"><Icon name="trophy" /></div>
                                            <div>
                                                <p className="text-[10px] font-black text-zinc-400 uppercase">Último Ganhador do Site</p>
                                                <p className="text-xl font-black uppercase italic">Ricardo F. - R$ 15.000,00</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                             </div>
                        </div>
                    </header>

                    {/* Sorteios Ativos */}
                    <section id="rifas" className="max-w-7xl mx-auto px-6 py-24 space-y-16">
                        <div className="text-center space-y-4">
                            <h3 className="text-4xl md:text-5xl font-black uppercase italic tracking-tighter">Escolha seu <span className="text-amber-500">Prêmio</span></h3>
                            <p className="text-zinc-500 font-bold uppercase text-[10px] tracking-[0.4em]">Sorteios ativos em tempo real</p>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {RAFFLES.map(r => (
                                <div key={r.id} className="glass rounded-[3rem] border-white/5 hover:border-amber-500/30 transition-all group overflow-hidden">
                                    <div className="h-64 overflow-hidden relative">
                                        <img src={r.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        <div className="absolute top-6 left-6 px-4 py-1.5 glass rounded-full text-[10px] font-black uppercase border-white/20">💰 Cash Prize</div>
                                    </div>
                                    <div className="p-10 space-y-8">
                                        <div className="space-y-2">
                                            <h4 className="text-2xl font-black uppercase italic tracking-tight">{r.titulo}</h4>
                                            <p className="text-zinc-500 text-xs font-bold uppercase">{r.desc}</p>
                                        </div>
                                        <ProgressBar vendidos={r.vendidos} total={r.total} />
                                        <div className="flex justify-between items-end pt-4 border-t border-white/5">
                                            <div>
                                                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-1">Cota</p>
                                                <p className="text-2xl font-black text-amber-500">R$ {r.preco.toFixed(2)}</p>
                                            </div>
                                            <button 
                                                onClick={() => handleBuy(r, 100)}
                                                className="bg-white text-black text-[10px] font-black uppercase px-8 py-4 rounded-2xl hover:bg-amber-500 transition-colors"
                                            >
                                                Comprar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Seção de Ganhadores e Ranking */}
                    <section className="bg-white/[0.02] py-32 border-y border-white/5">
                        <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-20">
                            
                            {/* Ranking */}
                            <div id="ranking" className="space-y-10">
                                <div className="flex items-center gap-5">
                                    <div className="p-4 gold-gradient rounded-3xl text-black"><Icon name="trophy" /></div>
                                    <div>
                                        <h3 className="text-3xl font-black uppercase italic">Top Compradores</h3>
                                        <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Recompensas para os maiores do mês</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    {RANKING.map((u, i) => (
                                        <div key={i} className="flex items-center justify-between p-6 rounded-3xl glass border-white/5 hover:bg-white/5 transition-all">
                                            <div className="flex items-center gap-6">
                                                <div className="w-14 h-14 rounded-2xl bg-zinc-800 flex items-center justify-center text-amber-500 font-black text-sm border border-white/5">{u.avatar}</div>
                                                <div>
                                                    <p className="font-black uppercase italic text-lg">{u.nome}</p>
                                                    <p className="text-[10px] font-bold text-zinc-500 uppercase">Posição {i+1} no Ranking</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-black text-amber-500">{u.cotas}</p>
                                                <p className="text-[10px] font-black text-zinc-600 uppercase">Cotas</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Ganhadores */}
                            <div id="ganhadores" className="space-y-10">
                                <div className="flex items-center gap-5">
                                    <div className="p-4 bg-emerald-500 rounded-3xl text-black"><Icon name="award" /></div>
                                    <div>
                                        <h3 className="text-3xl font-black uppercase italic text-emerald-500">Ganhadores</h3>
                                        <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Dinheiro pago na hora</p>
                                    </div>
                                </div>
                                <div className="grid sm:grid-cols-2 gap-6">
                                    {WINNERS.map((w, i) => (
                                        <div key={i} className="p-8 rounded-[2.5rem] glass-card border-white/10 space-y-5">
                                            <div className="flex justify-between items-start">
                                                <span className="text-[10px] font-black text-zinc-500 uppercase bg-white/5 px-3 py-1 rounded-full">{w.data}</span>
                                                <div className="text-emerald-500"><Icon name="cash" className="w-5 h-5" /></div>
                                            </div>
                                            <div>
                                                <p className="text-xl font-black italic uppercase mb-1">{w.nome}</p>
                                                <p className="text-2xl font-black text-emerald-400">{w.premio}</p>
                                            </div>
                                            <p className="text-[10px] font-bold text-zinc-600 uppercase italic truncate">{w.rifa}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="pt-32 pb-16 px-6 max-w-7xl mx-auto border-t border-white/5">
                        <div className="grid md:grid-cols-4 gap-12">
                            <div className="col-span-2 space-y-6">
                                <div className="flex items-center gap-2">
                                    <div className="gold-gradient p-1.5 rounded-md text-black"><Icon name="crown" className="w-4 h-4" /></div>
                                    <h1 className="font-black italic uppercase text-xl">Golden<span className="text-amber-500">Rifa</span></h1>
                                </div>
                                <p className="text-zinc-500 text-sm max-w-sm font-medium leading-relaxed">
                                    A maior plataforma de sorteios em dinheiro do Brasil. Transparência total via Loteria Federal e pagamento instantâneo via PIX.
                                </p>
                            </div>
                            <div className="space-y-4">
                                <h5 className="text-[10px] font-black uppercase tracking-[0.3em] text-amber-500">Links Úteis</h5>
                                <ul className="text-xs font-bold uppercase text-zinc-400 space-y-3">
                                    <li><a href="#" className="hover:text-white transition-colors">Termos e Condições</a></li>
                                    <li><a href="#" className="hover:text-white transition-colors">Como Participar</a></li>
                                    <li><a href="#" className="hover:text-white transition-colors">Suporte WhatsApp</a></li>
                                </ul>
                            </div>
                            <div className="space-y-4">
                                <h5 className="text-[10px] font-black uppercase tracking-[0.3em] text-emerald-500">Segurança</h5>
                                <div className="flex gap-4 opacity-40">
                                    <img src="https://logospng.org/download/pix/logo-pix-1024.png" className="h-6 grayscale" />
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" className="h-6 grayscale" />
                                </div>
                                <p className="text-[8px] text-zinc-600 font-bold uppercase">Conexão Segura SSL 256-bits</p>
                            </div>
                        </div>
                        <div className="mt-24 pt-8 border-t border-white/5 text-center">
                            <p className="text-[8px] font-black text-zinc-700 uppercase tracking-[0.6em]">© 2026 GoldenRifa - Todos os direitos reservados - +18 Apenas</p>
                        </div>
                    </footer>

                    {/* Prova Social */}
                    {toast && (
                        <div className="fixed bottom-10 left-10 z-[100] animate-in">
                            <div className="glass px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-5 border-l-4 border-amber-500">
                                <div className="w-12 h-12 bg-amber-500/20 text-amber-500 rounded-full flex items-center justify-center">
                                    <Icon name="ticket" className="w-6 h-6" />
                                </div>
                                <div>
                                    <p className="text-sm font-black uppercase italic">{toast.name} <span className="text-amber-500">comprou {toast.amount} cotas</span></p>
                                    <p className="text-[9px] font-extrabold text-zinc-500 uppercase tracking-widest">Acabou de participar!</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* WhatsApp FAB */}
                    <button 
                        onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)}
                        className="fixed bottom-10 right-10 w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-black shadow-[0_0_30px_rgba(16,185,129,0.4)] hover:scale-110 active:scale-95 transition-all z-50"
                    >
                        <Icon name="whatsapp" className="w-10 h-10" />
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
